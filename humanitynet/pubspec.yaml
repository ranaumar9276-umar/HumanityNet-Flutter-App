name: humanitynet
description: "HumanityNet - Connecting Hearts, Changing Lives"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5

  # State Management
  provider: ^6.1.0

  # UI/UX
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  animate_do: ^3.3.4

  # Functionality
  image_picker: ^1.0.4
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  shared_preferences: ^2.2.2
  timeago: ^3.6.0
  uuid: ^4.2.1
  intl: ^0.18.1
  flutter_local_notifications: ^17.2.3
  http: ^1.1.0 # NEW - Claude AI ke liye

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/